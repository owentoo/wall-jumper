<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>Wall Jumper — Pixel Perfect</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000; color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    .shell { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    .stage { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #game-root canvas{
      display:block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -ms-interpolation-mode: nearest-neighbor;
      touch-action: manipulation;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
  <div class="shell"><div class="stage"><div id="game-root" style="width:100%;height:100%;"></div></div></div>

<script>
(() => {
  // -------- Tunables --------
  const GAME_W        = 500;
  // Dynamic height: fill viewport aspect ratio (min 890, max 1250)
  const GAME_H        = Math.round(Phaser.Math.Clamp(GAME_W * (window.innerHeight / window.innerWidth), 890, 1250));
  const WORLD_H       = 100000;
  const WRAP_THRESHOLD= 50000;
  const WRAP_DISTANCE = 40000;
  const FALL_MIN      = 300, FALL_MAX = 520, FALL_ACCEL = 6.0;
  const PUSH_V        = 980;
  const BOOST_V       = 1450;
  const BOOST_MS      = 60;

  const PIXEL_SCALE   = 2;

  const WALL_SRC_W    = 26;
  const OB_SRC_W = 24, OB_SRC_H = 12;
  const SPIKE_INSET_SRC = 0;
  const NINJA_FRAME_W = 24, NINJA_FRAME_H = 34;
  const COIN_FRAME    = 16;
  const GRAD_SRC_W    = 54, GRAD_SRC_H = 104;

  const WALL_DISP_W   = WALL_SRC_W * PIXEL_SCALE;
  const OB_DISP_W     = OB_SRC_W   * PIXEL_SCALE;
  const OB_DISP_H     = OB_SRC_H   * PIXEL_SCALE;
  const SPIKE_INSET   = SPIKE_INSET_SRC * PIXEL_SCALE;
  const GRAD_DISP_W   = GRAD_SRC_W * PIXEL_SCALE;

  const MUSIC_RATE_MIN = 1.00, MUSIC_RATE_MAX = 1.12, MUSIC_VOLUME = 0.60, MUSIC_SMOOTH = 0.06;

  // ======== AudioManager ========
  class AudioManager {
    constructor(scene){
      this.scene = scene;
      const saved=(()=>{ try{return JSON.parse(localStorage.getItem('wj_audio')||'{}');}catch(e){return{};} })();
      this.musicBaseVolume=(typeof saved.musicBaseVolume==='number')? saved.musicBaseVolume : MUSIC_VOLUME;
      this.musicMuted=!!saved.musicMuted;
      this.sfxMuted=!!saved.sfxMuted;

      this.music   = scene.sound.add('bgm',{loop:true,volume:this.musicBaseVolume,rate:MUSIC_RATE_MIN});
      this.jumpSfx = scene.sound.add('jumpSfx',{volume:0});
      this.landSfx = scene.sound.add('landSfx',{volume:0});

      this.coinAudio=null;
      scene.input.once('pointerdown',()=>{
        try{ const a=new Audio('coin.wav'); a.preload='auto'; a.crossOrigin='anonymous'; a.muted=this.sfxMuted; a.volume=this.musicBaseVolume/3; this.coinAudio=a; }catch(e){}
      });

      this.applySettings();
    }

    applySettings(){
      const musicVol=this.musicMuted?0:this.musicBaseVolume;
      const sfxVol=this.sfxMuted?0:(this.musicBaseVolume/3);
      this.music?.setVolume(musicVol); this.jumpSfx?.setVolume(sfxVol); this.landSfx?.setVolume(sfxVol);
      if(this.coinAudio){ this.coinAudio.muted=this.sfxMuted; this.coinAudio.volume=sfxVol; }
      try{ localStorage.setItem('wj_audio',JSON.stringify({musicBaseVolume:this.musicBaseVolume,musicMuted:this.musicMuted,sfxMuted:this.sfxMuted})); }catch(e){}
    }

    toggleMusic(){ this.musicMuted=!this.musicMuted; this.applySettings(); }
    toggleSfx(){ this.sfxMuted=!this.sfxMuted; this.applySettings(); }

    startMusic(){
      if(this.music.isPlaying) this.music.stop();
      this.music.setRate(MUSIC_RATE_MIN);
      this.applySettings();
      this.music.play();
    }
    stopMusic(){ if(this.music&&this.music.isPlaying) this.music.stop(); }
    pauseMusic(){ if(this.music&&this.music.isPlaying) this.music.pause(); }
    resumeMusic(){ if(this.music&&this.music.isPaused) this.music.resume(); }

    playJump(){ this.jumpSfx.play(); }
    playLand(){ this.landSfx.play(); }
    playCoin(){
      if(this.coinAudio){ try{ this.coinAudio.currentTime=0; this.coinAudio.play(); }catch(e){} }
    }

    updateMusicTempo(fallSpeed){
      if(!this.music||!this.music.isPlaying) return;
      const t=Phaser.Math.Clamp((fallSpeed-FALL_MIN)/(FALL_MAX-FALL_MIN),0,1);
      const desired=Phaser.Math.Linear(MUSIC_RATE_MIN,MUSIC_RATE_MAX,Phaser.Math.Easing.Quadratic.Out(t));
      const next=this.music.rate + (desired - this.music.rate)*MUSIC_SMOOTH;
      if(Math.abs(next - this.music.rate)>0.001) this.music.setRate(next);
    }
  }

  // ======== ObstacleSpawner ========
  class ObstacleSpawner {
    constructor(scene, obstacles){
      this.scene = scene;
      this.obstacles = obstacles;
      this.spacingBaseMin=260; this.spacingBaseMax=340;
      this.nextSpawnY=0; this.lastSide='right'; this.lastY=0;
      this.activePattern=null;
    }

    reset(startY){
      this.nextSpawnY=startY+260; this.lastSide='right'; this.lastY=startY;
      this.activePattern=null;
      this.obstacles.clear(true,true);
    }

    getCurrentSpacing(fallSpeed){
      const t=Phaser.Math.Clamp((fallSpeed-FALL_MIN)/(FALL_MAX-FALL_MIN),0,1);
      const min=Phaser.Math.Linear(this.spacingBaseMin,this.spacingBaseMin+70,t);
      const max=Phaser.Math.Linear(this.spacingBaseMax,this.spacingBaseMax+110,t);
      return {min,max};
    }

    patternChance(score){
      if(score<15) return 0;
      return Phaser.Math.Clamp(0.08 + (score-15)*0.004, 0.08, 0.20);
    }

    pickPattern(score){
      const pool=[];
      pool.push({gen:this.genAlternating, weight:3});
      pool.push({gen:this.genSameSide, weight:2});
      if(score>=30){
        pool.push({gen:this.genZigzagSqueeze, weight:2});
      }
      const total=pool.reduce((s,p)=>s+p.weight,0);
      let r=Math.random()*total;
      for(const p of pool){ r-=p.weight; if(r<=0) return p.gen.call(this); }
      return pool[0].gen.call(this);
    }

    *genAlternating(){
      const count=Phaser.Math.Between(4,6);
      let side=(this.lastSide==='left')?'right':'left';
      for(let i=0;i<count;i++){
        yield {side, spacingMul:0.75};
        side=(side==='left')?'right':'left';
      }
      yield {side:null, spacingMul:2.0}; // breather
    }

    *genSameSide(){
      const count=Phaser.Math.Between(3,4);
      const side=(this.lastSide==='left')?'right':'left';
      for(let i=0;i<count;i++) yield {side, spacingMul:1.0};
      yield {side:null, spacingMul:2.0};
    }

    *genZigzagSqueeze(){
      const count=Phaser.Math.Between(5,8);
      let side=(this.lastSide==='left')?'right':'left';
      for(let i=0;i<count;i++){
        const mul=Phaser.Math.Linear(1.0,0.6,i/(count-1));
        yield {side, spacingMul:mul};
        side=(side==='left')?'right':'left';
      }
      yield {side:null, spacingMul:2.5};
    }

    placeSpike(side, y){
      const s=this.scene;
      const texKey=s.textures.exists('obstacle')?'obstacle':'obstacle_fallback';
      const ob=this.obstacles.create(0,y,texKey).setDepth(1);
      ob.setScale(PIXEL_SCALE);
      ob.body.setSize(OB_DISP_W-16,OB_DISP_H-10,true);
      ob.setData('side',side);
      ob.setFlipX(side==='left');
      const edge=s.innerEdgeX(side);
      const half=OB_DISP_W*0.5;
      ob.x=(side==='left') ? Math.round(edge + half - SPIKE_INSET) : Math.round(edge - half + SPIKE_INSET);
      ob.body.allowGravity=false; ob.setImmovable(true); ob.setVelocity(0,0);
    }

    spawnAhead(playerY, fallSpeed, score){
      const bufferAhead=1000;
      const {min:curMin,max:curMax}=this.getCurrentSpacing(fallSpeed);

      while(this.nextSpawnY<playerY+bufferAhead){
        let side, spacingMul=1.0;

        if(this.activePattern){
          const step=this.activePattern.next();
          if(step.done){ this.activePattern=null; }
          else { side=step.value.side; spacingMul=step.value.spacingMul; }
        }

        if(!this.activePattern && side===undefined){
          if(Math.random()<this.patternChance(score)){
            this.activePattern=this.pickPattern(score);
            const step=this.activePattern.next();
            if(!step.done){ side=step.value.side; spacingMul=step.value.spacingMul; }
          }
        }

        if(side===undefined){
          side=(Math.random()<0.8)?((this.lastSide==='left')?'right':'left'):this.lastSide;
        }

        if(side===null){
          // breather — just advance spacing
          this.nextSpawnY+=Math.round(Phaser.Math.Between(curMin|0,curMax|0)*spacingMul);
          continue;
        }

        const spacing=Math.round(Phaser.Math.Between(curMin|0,curMax|0)*spacingMul);
        const y=Math.max(this.nextSpawnY, this.lastY+spacing);

        this.placeSpike(side,y);
        this.lastSide=side;

        this.lastY=y;
        this.nextSpawnY=y+Math.round(Phaser.Math.Between(curMin|0,curMax|0)*spacingMul);
        if(!this.activePattern && Math.random()<0.12) this.nextSpawnY+=Phaser.Math.Between(40,80);
      }
    }

    cullAbove(scrollY){
      const topCull=scrollY-200;
      this.obstacles.children.each(o=>{ if(o.active&&o.y<topCull) o.destroy(); });
    }

    wrapPositions(dy){
      this.nextSpawnY-=dy; this.lastY-=dy;
      this.obstacles.children.iterate(ob=>{
        if(!ob||!ob.active) return;
        ob.y-=dy; ob.body.updateFromGameObject();
      });
    }

    alignToEdges(){
      this.obstacles.children.iterate(ob=>{
        if(!ob||!ob.active) return;
        const side=ob.getData('side'), edge=this.scene.innerEdgeX(side), half=OB_DISP_W*0.5;
        const targetX=(side==='left') ? Math.round(edge + half - SPIKE_INSET) : Math.round(edge - half + SPIKE_INSET);
        if(ob.x!==targetX){ ob.x=targetX; ob.body.updateFromGameObject(); }
        ob.setFlipX(side==='left'); ob.setVelocityX(0);
      });
    }
  }

  // ======== UIOverlay ========
  class UIOverlay {
    constructor(scene){
      this.scene = scene;
      this.overlayStart = null;
      this.overlayGameOver = null;
    }

    makeToggleButton({x,y,label,getOn,onToggle}){
      const s=this.scene;
      const group=s.add.container(x,y).setScrollFactor(0).setDepth(1001);
      const bg=s.add.rectangle(0,0,180,40,0x1c222b,0.9).setOrigin(0.5).setStrokeStyle(2,0x344053);
      const txt=s.add.text(0,0,'',{fontSize:'16px',color:'#e5eefc'}).setOrigin(0.5);
      const refresh=()=>{ const on=getOn(); txt.setText(`${label}: ${on?'On':'Off'}`); bg.setFillStyle(on?0x223040:0x282a33,0.95); }; refresh();
      const hit=s.add.zone(0,0,180,40).setOrigin(0.5).setInteractive({useHandCursor:true});
      hit.on('pointerdown',()=>{ onToggle(); refresh(); });
      group.add([bg,txt,hit]); return {group,refresh};
    }

    showStart({W,H,audio,onStart}){
      this.hideAll();
      const s=this.scene;
      this.overlayStart=s.add.container(0,0).setScrollFactor(0).setDepth(1000);
      const dim=s.add.rectangle(W/2,H/2,W,H,0x000000,0.45).setInteractive({useHandCursor:true});
      const title=s.add.text(W/2,H*0.30,'WALL JUMPER',{fontSize:'40px',fontStyle:'800',color:'#ffffff'}).setOrigin(0.5);
      const instr=s.add.text(W/2,H*0.40,'Tap anywhere to start\nScore on each wall touch\nAvoid the hazards',{fontSize:'18px',color:'#b7c0cf',align:'center'}).setOrigin(0.5);
      const musicToggle=this.makeToggleButton({x:W/2-95,y:H*0.55,label:'Music',getOn:()=>!audio.musicMuted,onToggle:()=>audio.toggleMusic()});
      const sfxToggle  =this.makeToggleButton({x:W/2+95,y:H*0.55,label:'SFX',getOn:()=>!audio.sfxMuted,onToggle:()=>audio.toggleSfx()});
      this.overlayStart.add([dim,title,instr,musicToggle.group,sfxToggle.group]);
      s.input.once('pointerdown',onStart);
    }

    showGameOver({W,H,score,best,onRestart}){
      this.hideAll();
      const s=this.scene;
      this.overlayGameOver=s.add.container(0,0).setScrollFactor(0).setDepth(1000);
      const dim=s.add.rectangle(W/2,H/2,W,H,0x000000,0.45).setInteractive({useHandCursor:true});
      const title=s.add.text(W/2,H*0.30,'GAME OVER',{fontSize:'40px',fontStyle:'800',color:'#ffffff'}).setOrigin(0.5);
      const stats=s.add.text(W/2,H*0.40,`Score ${score} • Best ${best}`,{fontSize:'18px',color:'#b7c0cf'}).setOrigin(0.5);

      // Share button
      const shareBtn=s.add.text(W/2,H*0.48,'COPY SCORE',{fontSize:'18px',fontStyle:'700',color:'#ffd54a',backgroundColor:'#1c222b',padding:{x:16,y:8}})
        .setOrigin(0.5).setInteractive({useHandCursor:true});
      shareBtn.on('pointerdown',(ptr)=>{
        ptr.event.stopPropagation();
        const text=`Wall Jumper: ${score} points! Can you beat my score?`;
        if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(()=>{
            shareBtn.setText('COPIED!');
            s.time.delayedCall(1500,()=>{ if(shareBtn.active) shareBtn.setText('COPY SCORE'); });
          }).catch(()=>{
            if(navigator.share) navigator.share({title:'Wall Jumper',text});
          });
        } else if(navigator.share){
          navigator.share({title:'Wall Jumper',text});
        }
      });

      const tip=s.add.text(W/2,H*0.56,'Tap anywhere to restart',{fontSize:'16px',color:'#9aa3b2'}).setOrigin(0.5);
      this.overlayGameOver.add([dim,title,stats,shareBtn,tip]);

      // Delay restart listener so share button click doesn't trigger it
      s.time.delayedCall(200,()=>{ s.input.once('pointerdown',onRestart); });
    }

    hideAll(){
      if(this.overlayStart){ this.overlayStart.destroy(); this.overlayStart=null; }
      if(this.overlayGameOver){ this.overlayGameOver.destroy(); this.overlayGameOver=null; }
    }
  }

  // ======== Main Scene ========
  class Main extends Phaser.Scene {
    constructor(){ super('main'); }
    get W(){ return GAME_W; }
    get H(){ return GAME_H; }
    get WALL_GAP(){ return 367; }
    get WALL_X(){ const l=(this.W - this.WALL_GAP)/2, r=(this.W + this.WALL_GAP)/2; return {left:l,right:r}; }

    innerEdgeX(which){
      const halfW = WALL_DISP_W * 0.5;
      return Math.round( (which==='left') ? (this.WALL_X.left + halfW) : (this.WALL_X.right - halfW) );
    }

    preload(){
      this.load.spritesheet('ninja', 'ninja_sheet.png', { frameWidth: NINJA_FRAME_W, frameHeight: NINJA_FRAME_H });
      this.load.image('wallTile', 'wall.png');
      this.load.image('obstacle', 'spike.png');
      this.load.spritesheet('coin', 'coin.png', { frameWidth: COIN_FRAME, frameHeight: COIN_FRAME });
      this.load.image('wallGrad', 'gradiant.png');
      this.load.audio('bgm', ['NINJA.mp3']);
      this.load.audio('jumpSfx', 'jump.wav');
      this.load.audio('landSfx', 'land.wav');

      const g1=this.make.graphics({add:false});
      g1.fillStyle(0xff4d4d,1).fillRect(0,0,OB_SRC_W,OB_SRC_H);
      g1.generateTexture('obstacle_fallback',OB_SRC_W,OB_SRC_H); g1.destroy();

      const W=WALL_SRC_W, H=256, g2=this.make.graphics({add:false});
      g2.fillStyle(0x2a2f3a,1).fillRect(0,0,W,H);
      g2.lineStyle(1,0x3a4250,1);
      for(let y=0;y<H;y+=8) g2.strokeLineShape(new Phaser.Geom.Line(0,y,W,y));
      g2.generateTexture('wall_fallback',W,H); g2.destroy();
    }

    create(){
      // Force nearest-neighbor on all textures
      this.textures.list && Object.values(this.textures.list).forEach(t=>{
        if(t.source) t.source.forEach(s=>{ if(s.glTexture) s.setFilter(Phaser.Textures.FilterMode.NEAREST); });
      });

      // Anims
      this.anims.create({ key:'slide', frames:this.anims.generateFrameNumbers('ninja',{start:0,end:11}), frameRate:18, repeat:-1 });
      this.anims.create({ key:'jump',  frames:this.anims.generateFrameNumbers('ninja',{start:12,end:15}), frameRate:18, repeat:0  });
      this.anims.create({ key:'land',  frames:[{key:'ninja',frame:16}], frameRate:1, repeat:0 });
      this.anims.create({ key:'coinSpin', frames:this.anims.generateFrameNumbers('coin',{start:0,end:3}), frameRate:8, repeat:-1 });

      // World & camera
      this.physics.world.setBounds(0,0,this.W,WORLD_H);
      this.cam=this.cameras.main; this.cam.setBounds(0,0,this.W,WORLD_H);
      this.cam.setBackgroundColor('#000000');
      this.cam.setRoundPixels(true);

      // Walls (visual)
      const wallKey=this.textures.exists('wallTile')?'wallTile':'wall_fallback';
      this.leftWallVis  = this.add.tileSprite(this.WALL_X.left,  WORLD_H/2, WALL_DISP_W, WORLD_H, wallKey)
        .setOrigin(0.5).setDepth(0).setTileScale(PIXEL_SCALE,PIXEL_SCALE);
      this.rightWallVis = this.add.tileSprite(this.WALL_X.right, WORLD_H/2, WALL_DISP_W, WORLD_H, wallKey)
        .setOrigin(0.5).setDepth(0).setFlipX(true).setTileScale(PIXEL_SCALE,PIXEL_SCALE);

      // Rails (physics)
      this.add.graphics().generateTexture('rail1x1',1,1);
      this.leftRail  = this.physics.add.staticImage(this.WALL_X.left,  WORLD_H/2,'rail1x1').setAlpha(0);
      this.rightRail = this.physics.add.staticImage(this.WALL_X.right, WORLD_H/2,'rail1x1').setAlpha(0);
      this.leftRail.setDisplaySize(WALL_DISP_W,WORLD_H).refreshBody();
      this.rightRail.setDisplaySize(WALL_DISP_W,WORLD_H).refreshBody();

      // Mid-area background
      const leftInner0  = this.innerEdgeX('left');
      const rightInner0 = this.innerEdgeX('right');
      const midWidth0   = Math.max(1, rightInner0 - leftInner0);
      this.midBg = this.add.rectangle(
        Math.round((leftInner0 + rightInner0)/2), WORLD_H/2,
        midWidth0, WORLD_H, 0x130620, 1
      ).setOrigin(0.5).setDepth(-1);

      // Gradient strips
      this.leftGrad = this.add.tileSprite(
        leftInner0 + Math.round(GRAD_DISP_W/2), WORLD_H/2, GRAD_DISP_W, WORLD_H, 'wallGrad'
      ).setOrigin(0.5).setDepth(0).setTileScale(PIXEL_SCALE,PIXEL_SCALE).setFlipX(true);
      this.rightGrad = this.add.tileSprite(
        rightInner0 - Math.round(GRAD_DISP_W/2), WORLD_H/2, GRAD_DISP_W, WORLD_H, 'wallGrad'
      ).setOrigin(0.5).setDepth(0).setTileScale(PIXEL_SCALE,PIXEL_SCALE).setFlipX(false);

      // Player
      this.startY=Math.min(700,Math.max(420,this.H*0.75));
      this.player=this.physics.add.sprite(this.W/2,this.startY,'ninja',0).setDepth(2).setScale(PIXEL_SCALE);
      this.player.body.setSize(18,24,true);
      this.player.body.setOffset((NINJA_FRAME_W-18)/2,(NINJA_FRAME_H-24)/2 - 2);

      // State
      this.physics.world.gravity.y=0;
      this.fallSpeed=FALL_MIN; this.side='left'; this.onWall=true;
      this.alive=true; this.playing=false; this.deathFall=false;
      this.score=0;
      this.best=(()=>{ try{ return parseInt(localStorage.getItem('wj_best'),10)||0; }catch(e){ return 0; } })();

      // Camera follow
      this.cam.startFollow(this.player,true,1,1);

      // HUD
      this.scoreText=this.add.text(this.W/2,50,'0',{fontSize:'48px',fontStyle:'800',color:'#fff'})
        .setOrigin(0.5).setScrollFactor(0).setDepth(10);
      this.subText=this.add.text(this.W/2,this.H-34,'Tap to start',{fontSize:'16px',color:'#9aa3b2'})
        .setOrigin(0.5).setScrollFactor(0).setDepth(10);

      // Obstacles + spawner
      this.obstaclesGroup=this.physics.add.group({allowGravity:false,immovable:true});
      this.physics.add.overlap(this.player,this.obstaclesGroup,()=>{ if(this.playing) this.gameOver(); },null,this);
      this.spawner = new ObstacleSpawner(this, this.obstaclesGroup);

      // Coin
      const midX=()=> (this.WALL_X.left + this.WALL_X.right)/2;
      this.coin=this.physics.add.sprite(midX(),this.startY+360,'coin',0).setScale(PIXEL_SCALE).setDepth(1);
      this.coin.body.setAllowGravity(false); this.coin.play('coinSpin');
      this.physics.add.overlap(this.player,this.coin,()=>this.collectCoin(),null,this);
      this.placeCoin=(y)=>{ this.coin.setX(Math.round(midX())); this.coin.setY(Math.round(y)); this.coin.setActive(true).setVisible(true); };
      this.advanceCoin=()=>{ const ahead=Phaser.Math.Between(520,820); this.placeCoin(this.player.y+ahead); };

      // Helpers
      this.updateFacing=()=>{ this.player.setFlipX(this.side==='right'); };
      this.playSlide =()=> this.player.anims.play('slide',true);
      this.playJump  =()=> this.player.anims.play('jump',true);

      // Audio + UI managers
      this.audio = new AudioManager(this);
      this.ui = new UIOverlay(this);

      // Rail contact
      const contact=(_p,rail)=>{
        if(!this.alive||!this.playing) return;
        const which=(rail===this.leftRail)?'left':'right';
        if(!this.onWall){
          this.onWall=true; this.side=which;
          this.snapToWall(which, null, {stationary:false});
          this.score+=1; this.scoreText.setText(this.score);
          this.player.anims.play('land',true);
          this.audio.playLand();
          this.time.delayedCall(80,()=>{ if(this.onWall&&this.alive) this.playSlide(); });
        } else {
          this.snapToWall(which, null, {stationary:false});
        }
      };
      this.colLeft = this.physics.add.collider(this.player,this.leftRail, contact,null,this);
      this.colRight= this.physics.add.collider(this.player,this.rightRail,contact,null,this);

      // Input
      this.input.on('pointerdown',()=>this.jump());

      // Spawn timer
      this.spawnTimer=this.time.addEvent({delay:60,loop:true,paused:true,callback:()=>this.spawner.spawnAhead(this.player.y, this.fallSpeed, this.score)});

      // Start
      this.showStartOverlay();
      this.snapToWall('left',this.startY,{stationary:true});
      this.player.setVelocity(0,0);

      // Resize & focus hooks
      this.game.events.on(Phaser.Core.Events.BLUR,()=>{ this.audio.pauseMusic(); });
      this.game.events.on(Phaser.Core.Events.FOCUS,()=>{ if(this.playing) this.audio.resumeMusic(); });
    }

    playerVisualHalfWidth(){ return (NINJA_FRAME_W * PIXEL_SCALE) * 0.5; }

    snapToWall(which,yOverride=null,{stationary=false}={}){
      this.onWall=true; this.side=which;
      const edge=this.innerEdgeX(which), pHalf=this.playerVisualHalfWidth();
      const x = Math.round( (which==='left') ? (edge + pHalf) : (edge - pHalf) );
      if(yOverride!==null) this.player.setY(yOverride);
      this.player.setX(x);
      this.player.setVelocity(0, stationary?0:this.fallSpeed);
      this.updateFacing(); this.playSlide();
    }

    showStartOverlay(){
      this.ui.hideAll();
      this.playing=false; this.alive=true; this.deathFall=false; this.fallSpeed=FALL_MIN;
      this.spawner.reset(this.startY); this.spawnTimer.paused=true;

      this.cam.stopFollow(); this.cam.setBounds(0,0,this.W,WORLD_H);
      this.cam.setScroll(0,Math.max(0,this.startY-this.H*0.5));
      this.cam.startFollow(this.player,true,1,1);

      this.subText.setText('Tap to start').setVisible(true);

      this.snapToWall('left',this.startY,{stationary:true});
      this.player.setVelocity(0,0);

      this.ui.showStart({W:this.W,H:this.H,audio:this.audio,onStart:()=>this.startGame()});
    }

    showGameOverOverlay(){
      this.playing=false; this.spawnTimer.paused=true;
      this.audio.stopMusic();
      this.ui.showGameOver({W:this.W,H:this.H,score:this.score,best:this.best,onRestart:()=>this.restart()});
    }

    startGame(){
      this.ui.hideAll();
      if(this.colLeft) this.colLeft.active=true;
      if(this.colRight) this.colRight.active=true;

      this.audio.startMusic();

      this.score=0; this.scoreText.setText('0');
      this.subText.setText('Tap to jump').setVisible(true);
      this.fallSpeed=FALL_MIN;
      this.player.clearTint();

      this.snapToWall('left',this.startY,{stationary:false});

      this.spawner.reset(this.startY);
      this.placeCoin(this.player.y+420);

      this.alive=true; this.deathFall=false; this.playing=true;

      this.cam.rotation=0; this.cam.setBounds(0,0,this.W,WORLD_H);
      this.cam.startFollow(this.player,true,1,1);

      this.spawnTimer.paused=false;
    }

    restart(){ this.ui.hideAll(); this.startGame(); }

    jump(){
      if(!this.playing) return;
      if(!this.alive){ this.restart(); return; }
      if(!this.onWall) return;

      const dir=(this.side==='left')?1:-1;
      this.player.setVelocity(dir*BOOST_V,this.fallSpeed);
      this.onWall=false;
      this.subText.setVisible(false);

      this.playJump(); this.audio.playJump();

      this.time.delayedCall(BOOST_MS,()=>{ if(!this.onWall&&this.alive) this.player.setVelocity(dir*PUSH_V,this.fallSpeed); });
    }

    collectCoin(){
      if(!this.playing||!this.alive||!this.coin.active) return;
      this.score+=5; this.scoreText.setText(this.score);

      this.audio.playCoin();

      const pop=this.add.text(this.coin.x,this.coin.y-10,'+5',{fontSize:'16px',color:'#ffd54a'}).setDepth(5).setOrigin(0.5);
      this.tweens.add({targets:pop,y:pop.y-24,alpha:0,duration:420,ease:'Quad.Out',onComplete:()=>pop.destroy()});

      this.coin.setActive(false).setVisible(false);
      this.time.delayedCall(150,()=>this.advanceCoin());
    }

    // Infinite world: teleport everything back when player goes too far down
    wrapWorld(){
      const dy=WRAP_DISTANCE;
      this.cam.stopFollow();

      // Shift player
      this.player.y-=dy;
      this.player.body.reset(this.player.x, this.player.y);
      this.player.setVelocityY(this.fallSpeed);

      // Shift coin
      if(this.coin){
        this.coin.y-=dy;
        this.coin.body.updateFromGameObject();
      }

      // Shift obstacles via spawner
      this.spawner.wrapPositions(dy);

      // Shift camera
      this.cam.scrollY-=dy;
      this.cam.startFollow(this.player,true,1,1);
    }

    update(_time,dt){
      if(this.alive){
        this.fallSpeed=Math.min(FALL_MAX,this.fallSpeed+FALL_ACCEL*(dt/1000));
        if(this.player.body) this.player.setVelocityY(this.fallSpeed);

        // Keep ninja visually flush with wall every frame
        if(this.onWall){
          const edge=this.innerEdgeX(this.side);
          const pHalf=this.playerVisualHalfWidth();
          const x=Math.round((this.side==='left') ? (edge+pHalf) : (edge-pHalf));
          if(this.player.x!==x){ this.player.setX(x); this.player.setVelocityX(0); }
        }

        // Infinite world wrap
        if(this.playing && this.player.y>WRAP_THRESHOLD) this.wrapWorld();
      } else if(this.deathFall){
        if(this.player.body) this.player.setVelocity(0,900);
        const bottom=this.cam.scrollY+this.H+120;
        if(!this.ui.overlayGameOver&&this.player.y>bottom){ this.deathFall=false; this.showGameOverOverlay(); }
      }

      // Keep spikes glued to inner edge
      this.spawner.alignToEdges();

      // Cull obstacles above camera
      if(this.playing) this.spawner.cullAbove(this.cam.scrollY);

      // Keep coin centered between walls
      if(this.coin&&this.coin.active){
        const tx=Math.round((this.WALL_X.left+this.WALL_X.right)/2);
        if(this.coin.x!==tx){ this.coin.x=tx; this.coin.body.updateFromGameObject(); }
      }
      if(this.coin&&(this.coin.y<this.cam.scrollY-200)) this.advanceCoin();

      // Music tempo
      this.audio.updateMusicTempo(this.fallSpeed);
    }

    gameOver(){
      if(!this.alive) return;
      this.alive=false; this.playing=false;
      this.best=Math.max(this.best,this.score);
      try{ localStorage.setItem('wj_best',this.best); }catch(e){}
      this.player.setTint(0xff4d4d);
      this.spawnTimer.paused=true;
      if(this.colLeft) this.colLeft.active=false;
      if(this.colRight) this.colRight.active=false;
      this.cam.stopFollow(); this.onWall=false; this.deathFall=true; this.player.setVelocity(0,900);
      this.audio.stopMusic();
      this.showGameOverOverlay();
    }

  }

  const game=new Phaser.Game({
    type: Phaser.AUTO,
    parent: 'game-root',
    width: GAME_W,
    height: GAME_H,
    backgroundColor: '#000000',
    physics: { default:'arcade', arcade:{ gravity:{y:0}, debug:false } },
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    render: { pixelArt:true, antialias:false, roundPixels:true, resolution:1 },
    scene: [Main]
  });
})();
</script>
</body>
</html>
